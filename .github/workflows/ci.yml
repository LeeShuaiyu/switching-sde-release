name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: CLI sanity
        run: |
          PYTHONPATH=src python -m switching_sde.cli.main --help
      - name: Test suite (unit + integration + regression)
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -p 'test_*.py'
      - name: Bundle sanity
        run: |
          python scripts/build_release_bundle.py --mode lite --output dist/ci_lite.tar.gz
